{% load static %}
{% load i18n %}

{% get_current_language as LANGUAGE_CODE %}

{% if LANGUAGE_CODE == "en" %}
<link rel="stylesheet" href="{% static 'en/css/helper.css' %}" />
<link rel="stylesheet" href="{% static 'en/css/theme.css' %}" />

{% elif LANGUAGE_CODE == "fa" %}
<link rel="stylesheet" href="{% static 'fa/css/helper.css' %}" />
<link rel="stylesheet" href="{% static 'fa/css/theme.css' %}" />

{% elif LANGUAGE_CODE == "ckb" %}
<link rel="stylesheet" href="{% static 'ckb/css/helper.css' %}" />
<link rel="stylesheet" href="{% static 'ckb/css/theme.css' %}" />

{% endif %}
