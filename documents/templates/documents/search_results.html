<h1>نتایج جستجو برای "{{ query }}"</h1>

{% if posts %}
    <ul>
    {% for post in posts %}
        <li>
            <a href="{% url 'documents:post-detail' post.slug %}">{{ post.get_translated_title }}</a>
        </li>
    {% endfor %}
    </ul>
{% else %}
    <p>هیچ نتیجه‌ای یافت نشد.</p>
{% endif %}
